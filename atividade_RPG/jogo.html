<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- cabeçalho e título do RPG -->
            <div class="card-header text-center">
                Demon Slayer - Criado por Anna
            </div>
            <!-- Tela central do RPG -->
            <div class="card-body" style="background-image: url('assets/fundo.jpg');
            background-size: cover;">
                <div class="row">
                    <!-- Status do Heroi -->
                    <div class="col">
                        <ul class="list-group float-end text-center" style="width: 225px">
                            <li class="list-group-item">Zenitsu</li>
                            <li class="list-group-item">Caçador de Demônios</li>
                            <li class="list-group-item">
                                ❤️
                                <progress value="100" max="100" style="accent-color: red;"></progress>
                            </li>
                            <li class="list-group-item">
                                ⚔️
                                <progress value="100" max="100" style="accent-color: grey;"></progress>
                            </li>
                            <li class="list-group-item">
                                ⚡
                                <progress value="0" max="100" style="accent-color: orange;"></progress>
                            </li>
                        </ul>
                    </div>
                    <!-- Status do Inimigo -->
                    <div class="col"> <ul class="list-group float-start text-center" style="width: 225px">
                            <li class="list-group-item">Nezuko</li>
                            <li class="list-group-item">Demônio</li>
                            <li class="list-group-item">
                                🩷
                                <progress value="100" max="100" style="accent-color: rgb(244, 83, 250);"></progress>
                            </li>
                            <li class="list-group-item">
                                ⚔️
                                <progress value="100" max="100" style="accent-color: grey;"></progress>
                            </li>
                            <li class="list-group-item">
                                🦋
                                <progress value="0" max="100" style="accent-color: rgb(243, 151, 45);"></progress>
                            </li>
                        </ul> 
                    </div>
                </div> <!-- fechamento da row -->
                <div class="row">
                    <!-- img hero -->
                    <div class="col text-end">
                        <img src="assets/zemitsu.gif" width="220" height="209" />
                    </div>
                          <!-- img boss -->
                    <div class="col">
                        <img src="assets/nezuko.gif" width="200" height="209" /> 
                    </div>    
            </div>
            <div class="card-footer"> 
                 <small class="text-muted">Ações do herói</small>
                 <p></p>
                 <small class="text-muted">Ações do inimigo</small>
            </div>

        </div> <!-- fechamento od card -->
    </div> <!-- fechamento do container -->
</body>

</html>
